model:
  base_model    : "Qwen/Qwen2.5-7B-Instruct"
  quantization  : "4bit"
  dtype         : "fp16"
  attn_impl     : "eager"

lora:
  r             : 64
  alpha         : 128
  dropout       : 0.05
  bias          : "none"
  target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]

training:
  num_epochs                : 3
  learning_rate             : 2.0e-4
  lr_scheduler              : "cosine"
  warmup_ratio              : 0.05
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  max_seq_length            : 1024
  weight_decay              : 0.01
  max_grad_norm             : 1.0
  optimizer                 : "paged_adamw_8bit"
  eval_steps                : 100
  save_steps                : 100
  save_total_limit          : 3
  fp16                      : true
  gradient_checkpointing    : true

dataset:
  format    : "sharegpt"
  train_file: "data/jsonl/nexus_v2_sharegpt_train.jsonl"
  val_file  : "data/jsonl/nexus_v2_sharegpt_val.jsonl"

target_loss:
  epoch_1: 1.6
  epoch_2: 1.1
  epoch_3: 0.75
  overfit_warn: 0.40
